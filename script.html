<script>
// Global variables
let currentUser = null;
let currentToken = null;
let allTasks = [];
let allUsers = [];
let selectedTasks = new Set();
let autoRefreshInterval = null;
let isAutoRefreshEnabled = false;

// Initialize the application
document.addEventListener('DOMContentLoaded', function() {
    console.log('Task Manager App Initialized');
    
    // Check if user is already logged in
    const savedToken = localStorage.getItem('taskManagerToken');
    const savedUser = localStorage.getItem('taskManagerUser');
    
    if (savedToken && savedUser) {
        currentToken = savedToken;
        currentUser = JSON.parse(savedUser);
        showDashboard();
        loadDashboardData();
    } else {
        showLoginForm();
    }
    
    initializeEventListeners();
    initializeFormValidation();
});

// Event Listeners
function initializeEventListeners() {
    // Login form
    const loginForm = document.getElementById('loginFormElement');
    if (loginForm) {
        loginForm.addEventListener('submit', handleLogin);
    }
    
    // Password toggle
    const togglePassword = document.querySelector('.toggle-password');
    if (togglePassword) {
        togglePassword.addEventListener('click', togglePasswordVisibility);
    }
    
    // Logout button
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', handleLogout);
    }
    
    // Navigation tabs
    const navTabs = document.querySelectorAll('.nav-tab, .mobile-nav-tab');
    navTabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
            const tabName = e.currentTarget.dataset.tab;
            switchTab(tabName);
        });
    });
    
    // Mobile menu toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', toggleMobileMenu);
    }
    
    // Auto-refresh toggle
    const autoRefreshBtn = document.getElementById('autoRefreshBtn');
    if (autoRefreshBtn) {
        autoRefreshBtn.addEventListener('click', toggleAutoRefresh);
    }
    
    // Date filters
    const applyDateFilter = document.getElementById('applyDateFilter');
    const clearDateFilter = document.getElementById('clearDateFilter');
    const applyTasksDateFilter = document.getElementById('applyTasksDateFilter');
    const clearTasksDateFilter = document.getElementById('clearTasksDateFilter');
    
    if (applyDateFilter) applyDateFilter.addEventListener('click', applyDateFilter);
    if (clearDateFilter) clearDateFilter.addEventListener('click', clearDateFilter);
    if (applyTasksDateFilter) applyTasksDateFilter.addEventListener('click', applyTasksDateFilter);
    if (clearTasksDateFilter) clearTasksDateFilter.addEventListener('click', clearTasksDateFilter);
    
    // Task filters
    const searchTasks = document.getElementById('searchTasks');
    const statusFilter = document.getElementById('statusFilter');
    const priorityFilter = document.getElementById('priorityFilter');
    
    if (searchTasks) searchTasks.addEventListener('input', filterTasks);
    if (statusFilter) statusFilter.addEventListener('change', filterTasks);
    if (priorityFilter) priorityFilter.addEventListener('change', filterTasks);
    
    // Task creation and management
    const createTaskBtn = document.getElementById('createTaskBtn');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const taskForm = document.getElementById('taskForm');
    const closeModal = document.getElementById('closeModal');
    const cancelTask = document.getElementById('cancelTask');
    
    if (createTaskBtn) createTaskBtn.addEventListener('click', () => openTaskModal());
    if (addTaskBtn) addTaskBtn.addEventListener('click', () => openTaskModal());
    if (taskForm) taskForm.addEventListener('submit', handleTaskSubmit);
    if (closeModal) closeModal.addEventListener('click', closeTaskModal);
    if (cancelTask) cancelTask.addEventListener('click', closeTaskModal);
    
    // Bulk actions
    const selectAllTasks = document.getElementById('selectAllTasks');
    const bulkStatusBtn = document.getElementById('bulkStatusBtn');
    const bulkDeleteBtn = document.getElementById('bulkDeleteBtn');
    const confirmBulkStatus = document.getElementById('confirmBulkStatus');
    const closeBulkModal = document.getElementById('closeBulkModal');
    const cancelBulkStatus = document.getElementById('cancelBulkStatus');
    
    if (selectAllTasks) selectAllTasks.addEventListener('change', handleSelectAllTasks);
    if (bulkStatusBtn) bulkStatusBtn.addEventListener('click', openBulkStatusModal);
    if (bulkDeleteBtn) bulkDeleteBtn.addEventListener('click', handleBulkDelete);
    if (confirmBulkStatus) confirmBulkStatus.addEventListener('click', handleBulkStatusUpdate);
    if (closeBulkModal) closeBulkModal.addEventListener('click', closeBulkStatusModal);
    if (cancelBulkStatus) cancelBulkStatus.addEventListener('click', closeBulkStatusModal);
    
    // Character counters
    const taskTitle = document.getElementById('taskTitle');
    const taskDescription = document.getElementById('taskDescription');
    
    if (taskTitle) {
        taskTitle.addEventListener('input', () => updateCharCount('titleCharCount', taskTitle.value.length, 200));
    }
    if (taskDescription) {
        taskDescription.addEventListener('input', () => updateCharCount('descCharCount', taskDescription.value.length, 2000));
    }
    
    // Password strength indicator
    const passwordInput = document.getElementById('password');
    if (passwordInput) {
        passwordInput.addEventListener('input', updatePasswordStrength);
    }
}

// Form Validation
function initializeFormValidation() {
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    
    if (emailInput) {
        emailInput.addEventListener('blur', validateEmail);
    }
    if (passwordInput) {
        passwordInput.addEventListener('blur', validatePassword);
    }
}

function validateEmail() {
    const email = document.getElementById('email').value;
    const emailError = document.getElementById('emailError');
    const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    
    if (email && !isValid) {
        showValidationError('emailError', 'Please enter a valid email address');
        return false;
    } else {
        hideValidationError('emailError');
        return true;
    }
}

function validatePassword() {
    const password = document.getElementById('password').value;
    const passwordError = document.getElementById('passwordError');
    
    if (password && password.length < 6) {
        showValidationError('passwordError', 'Password must be at least 6 characters long');
        return false;
    } else {
        hideValidationError('passwordError');
        return true;
    }
}

function showValidationError(elementId, message) {
    const errorElement = document.getElementById(elementId);
    if (errorElement) {
        errorElement.textContent = message;
        errorElement.classList.add('show');
    }
}

function hideValidationError(elementId) {
    const errorElement = document.getElementById(elementId);
    if (errorElement) {
        errorElement.classList.remove('show');
    }
}

// Password Strength Indicator
function updatePasswordStrength() {
    const password = document.getElementById('password').value;
    const strengthBar = document.querySelector('.strength-fill');
    const strengthText = document.querySelector('.strength-text');
    const strengthContainer = document.getElementById('passwordStrength');
    
    if (!password) {
        strengthContainer.style.display = 'none';
        return;
    }
    
    strengthContainer.style.display = 'block';
    
    let strength = 0;
    if (password.length >= 6) strength += 25;
    if (password.length >= 8) strength += 25;
    if (/[A-Z]/.test(password)) strength += 25;
    if (/[0-9]/.test(password)) strength += 25;
    
    strengthBar.style.width = strength + '%';
    
    if (strength < 25) {
        strengthBar.className = 'strength-fill';
        strengthText.textContent = 'Very Weak';
    } else if (strength < 50) {
        strengthBar.className = 'strength-fill weak';
        strengthText.textContent = 'Weak';
    } else if (strength < 75) {
        strengthBar.className = 'strength-fill fair';
        strengthText.textContent = 'Fair';
    } else if (strength < 100) {
        strengthBar.className = 'strength-fill good';
        strengthText.textContent = 'Good';
    } else {
        strengthBar.className = 'strength-fill strong';
        strengthText.textContent = 'Strong';
    }
}

// Password Visibility Toggle
function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.querySelector('.toggle-password i');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
}

// Character Counter
function updateCharCount(elementId, currentLength, maxLength) {
    const charCountElement = document.getElementById(elementId);
    if (charCountElement) {
        charCountElement.textContent = `${currentLength}/${maxLength}`;
        if (currentLength > maxLength * 0.9) {
            charCountElement.style.color = '#e74c3c';
        } else if (currentLength > maxLength * 0.7) {
            charCountElement.style.color = '#f39c12';
        } else {
            charCountElement.style.color = '#666';
        }
    }
}

// Authentication
async function handleLogin(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const loginError = document.getElementById('loginError');
    
    // Validate inputs
    if (!validateEmail() || !validatePassword()) {
        return;
    }
    
    showLoading('Signing in...', 'Please wait while we authenticate your credentials');
    
    try {
        const response = await makeRequest('login', { email, password });
        
        if (response.success) {
            currentUser = response.user;
            currentToken = response.token;
            
            // Save to localStorage
            localStorage.setItem('taskManagerToken', currentToken);
            localStorage.setItem('taskManagerUser', JSON.stringify(currentUser));
            
            hideLoading();
            showToast('success', 'Login successful! Welcome back.');
            showDashboard();
            loadDashboardData();
        } else {
            hideLoading();
            showLoginError(response.message);
        }
    } catch (error) {
        hideLoading();
        showLoginError('Login failed. Please try again.');
        console.error('Login error:', error);
    }
}

function showLoginError(message) {
    const loginError = document.getElementById('loginError');
    if (loginError) {
        loginError.textContent = message;
        loginError.classList.add('show');
    }
}

async function handleLogout() {
    try {
        if (currentToken) {
            await makeRequest('logout', {}, currentToken);
        }
    } catch (error) {
        console.error('Logout error:', error);
    } finally {
        // Clear local storage and reset state
        localStorage.removeItem('taskManagerToken');
        localStorage.removeItem('taskManagerUser');
        currentUser = null;
        currentToken = null;
        selectedTasks.clear();
        
        // Stop auto-refresh
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
        
        showToast('success', 'Logged out successfully');
        showLoginForm();
    }
}

// UI State Management
function showLoginForm() {
    document.getElementById('loginForm').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
}

function showDashboard() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    // Update user info in header
    if (currentUser) {
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userRole').textContent = currentUser.role;
        document.getElementById('userAvatar').src = currentUser.avatar || 'https://via.placeholder.com/40';
        
        // Show/hide admin features
        const isAdmin = currentUser.role === 'admin';
        document.getElementById('usersTab').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('mobileUsersTab').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('createTaskBtn').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('addTaskBtn').style.display = isAdmin ? 'flex' : 'none';
    }
}

// Navigation
function switchTab(tabName) {
    // Update tab buttons
    document.querySelectorAll('.nav-tab, .mobile-nav-tab').forEach(tab => {
        tab.classList.remove('active');
    });
    document.querySelectorAll(`[data-tab="${tabName}"]`).forEach(tab => {
        tab.classList.add('active');
    });
    
    // Update tab content
    document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
    });
    document.getElementById(tabName + 'Tab').classList.add('active');
    
    // Close mobile menu
    document.getElementById('mobileNav').style.display = 'none';
    
    // Load tab data
    switch (tabName) {
        case 'dashboard':
            loadDashboardData();
            break;
        case 'tasks':
            loadTasksData();
            break;
        case 'users':
            loadUsersData();
            break;
    }
}

function toggleMobileMenu() {
    const mobileNav = document.getElementById('mobileNav');
    mobileNav.style.display = mobileNav.style.display === 'none' ? 'block' : 'none';
}

// Auto-refresh functionality
function toggleAutoRefresh() {
    const autoRefreshBtn = document.getElementById('autoRefreshBtn');
    const btnText = autoRefreshBtn.querySelector('span');
    
    if (isAutoRefreshEnabled) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
        isAutoRefreshEnabled = false;
        btnText.textContent = 'Auto-refresh: OFF';
        autoRefreshBtn.classList.remove('active');
    } else {
        autoRefreshInterval = setInterval(() => {
            loadDashboardData();
        }, 30000); // Refresh every 30 seconds
        isAutoRefreshEnabled = true;
        btnText.textContent = 'Auto-refresh: ON';
        autoRefreshBtn.classList.add('active');
    }
}

// Data Loading
async function loadDashboardData() {
    try {
        showLoading('Loading dashboard...', 'Fetching your task data');
        
        const [statsResponse, tasksResponse] = await Promise.all([
            makeRequest('getTaskStats', {}, currentToken),
            makeRequest('getUserTasks', {}, currentToken)
        ]);
        
        if (statsResponse.success) {
            updateStatsDisplay(statsResponse.data);
        }
        
        if (tasksResponse.success) {
            allTasks = tasksResponse.data;
            displayRecentTasks(tasksResponse.data.slice(0, 5));
        }
        
        hideLoading();
    } catch (error) {
        hideLoading();
        showToast('error', 'Failed to load dashboard data');
        console.error('Dashboard load error:', error);
    }
}

async function loadTasksData() {
    try {
        showLoading('Loading tasks...', 'Fetching all tasks');
        
        const response = await makeRequest('getTasks', {}, currentToken);
        
        if (response.success) {
            allTasks = response.data;
            displayAllTasks(response.data);
            updateTasksTabLabel(response.data.length);
        } else {
            showToast('error', response.message);
        }
        
        hideLoading();
    } catch (error) {
        hideLoading();
        showToast('error', 'Failed to load tasks');
        console.error('Tasks load error:', error);
    }
}

async function loadUsersData() {
    try {
        showLoading('Loading users...', 'Fetching team members');
        
        const response = await makeRequest('getUsers', {}, currentToken);
        
        if (response.success) {
            allUsers = response.data;
            displayUsers(response.data);
        } else {
            showToast('error', response.message);
        }
        
        hideLoading();
    } catch (error) {
        hideLoading();
        showToast('error', 'Failed to load users');
        console.error('Users load error:', error);
    }
}

// Stats Display
function updateStatsDisplay(stats) {
    document.getElementById('totalTasks').textContent = stats.total;
    document.getElementById('pendingTasks').textContent = stats.pending;
    document.getElementById('inProgressTasks').textContent = stats.inProgress;
    document.getElementById('completedTasks').textContent = stats.completed;
    document.getElementById('overdueTasks').textContent = stats.overdue;
}

// Task Display
function displayRecentTasks(tasks) {
    const container = document.getElementById('recentTasksList');
    if (!container) return;
    
    if (tasks.length === 0) {
        container.innerHTML = '<p class="text-center" style="color: #666; padding: 20px;">No recent tasks found.</p>';
        return;
    }
    
    container.innerHTML = tasks.map(task => createTaskHTML(task)).join('');
}

function displayAllTasks(tasks) {
    const container = document.getElementById('allTasksList');
    if (!container) return;
    
    if (tasks.length === 0) {
        container.innerHTML = '<p class="text-center" style="color: #666; padding: 20px;">No tasks found.</p>';
        return;
    }
    
    container.innerHTML = tasks.map(task => createTaskHTML(task, true)).join('');
    
    // Add event listeners for task interactions
    addTaskEventListeners();
}

function createTaskHTML(task, showCheckbox = false) {
    const isOverdue = isTaskOverdue(task);
    const assignedUser = allUsers.find(user => user.id === task.assignedto);
    const assignedByName = assignedUser ? assignedUser.name : 'Unknown';
    
    return `
        <div class="task-item ${isOverdue ? 'overdue' : ''}" data-task-id="${task.id}">
            ${showCheckbox ? `
                <div class="task-checkbox">
                    <label class="checkbox-container">
                        <input type="checkbox" class="task-checkbox-input" data-task-id="${task.id}">
                        <span class="checkmark"></span>
                    </label>
                </div>
            ` : ''}
            <div class="task-content">
                <div class="task-header">
                    <div>
                        <h3 class="task-title">${escapeHtml(task.title)}</h3>
                        <p class="task-description">${escapeHtml(task.description)}</p>
                    </div>
                    <div class="task-status ${task.status}">${task.status.replace('-', ' ')}</div>
                </div>
                <div class="task-meta">
                    <span class="task-priority ${task.priority}">${task.priority}</span>
                    <span class="task-due-date">
                        <i class="fas fa-calendar"></i>
                        ${formatDate(task.duedate)}
                    </span>
                    <span class="task-assigned">
                        <i class="fas fa-user"></i>
                        ${escapeHtml(assignedByName)}
                    </span>
                </div>
                ${currentUser.role === 'admin' ? `
                    <div class="task-actions">
                        <button class="edit-task" onclick="editTask('${task.id}')">
                            <i class="fas fa-edit"></i>
                            Edit
                        </button>
                        <button class="delete-task" onclick="deleteTask('${task.id}')">
                            <i class="fas fa-trash"></i>
                            Delete
                        </button>
                    </div>
                ` : ''}
            </div>
        </div>
    `;
}

function addTaskEventListeners() {
    // Task checkbox selection
    document.querySelectorAll('.task-checkbox-input').forEach(checkbox => {
        checkbox.addEventListener('change', handleTaskSelection);
    });
    
    // Task item click (for selection)
    document.querySelectorAll('.task-item').forEach(item => {
        item.addEventListener('click', (e) => {
            if (!e.target.closest('.task-actions') && !e.target.closest('.task-checkbox')) {
                const checkbox = item.querySelector('.task-checkbox-input');
                if (checkbox) {
                    checkbox.checked = !checkbox.checked;
                    handleTaskSelection({ target: checkbox });
                }
            }
        });
    });
}

function handleTaskSelection(e) {
    const taskId = e.target.dataset.taskId;
    const isChecked = e.target.checked;
    
    if (isChecked) {
        selectedTasks.add(taskId);
    } else {
        selectedTasks.delete(taskId);
    }
    
    updateBulkActions();
    updateSelectAllCheckbox();
}

function handleSelectAllTasks(e) {
    const isChecked = e.target.checked;
    const checkboxes = document.querySelectorAll('.task-checkbox-input');
    
    checkboxes.forEach(checkbox => {
        checkbox.checked = isChecked;
        const taskId = checkbox.dataset.taskId;
        
        if (isChecked) {
            selectedTasks.add(taskId);
        } else {
            selectedTasks.delete(taskId);
        }
    });
    
    updateBulkActions();
}

function updateBulkActions() {
    const bulkActions = document.getElementById('bulkActions');
    const selectedCount = document.getElementById('selectedCount');
    
    if (selectedTasks.size > 0) {
        bulkActions.style.display = 'flex';
        selectedCount.textContent = `${selectedTasks.size} selected`;
    } else {
        bulkActions.style.display = 'none';
    }
}

function updateSelectAllCheckbox() {
    const selectAllCheckbox = document.getElementById('selectAllTasks');
    const checkboxes = document.querySelectorAll('.task-checkbox-input');
    const checkedBoxes = document.querySelectorAll('.task-checkbox-input:checked');
    
    if (checkedBoxes.length === 0) {
        selectAllCheckbox.indeterminate = false;
        selectAllCheckbox.checked = false;
    } else if (checkedBoxes.length === checkboxes.length) {
        selectAllCheckbox.indeterminate = false;
        selectAllCheckbox.checked = true;
    } else {
        selectAllCheckbox.indeterminate = true;
    }
}

// Task Management
function openTaskModal(taskId = null) {
    const modal = document.getElementById('taskModal');
    const modalTitle = document.getElementById('modalTitle');
    const taskForm = document.getElementById('taskForm');
    
    if (taskId) {
        // Edit mode
        const task = allTasks.find(t => t.id === taskId);
        if (task) {
            modalTitle.textContent = 'Edit Task';
            populateTaskForm(task);
        }
    } else {
        // Create mode
        modalTitle.textContent = 'Create New Task';
        taskForm.reset();
        updateCharCount('titleCharCount', 0, 200);
        updateCharCount('descCharCount', 0, 2000);
    }
    
    // Populate assigned users dropdown
    populateAssignedUsersDropdown();
    
    modal.style.display = 'flex';
}

function populateTaskForm(task) {
    document.getElementById('taskTitle').value = task.title;
    document.getElementById('taskDescription').value = task.description;
    document.getElementById('taskAssignedTo').value = task.assignedto;
    document.getElementById('taskDueDate').value = task.duedate;
    document.getElementById('taskPriority').value = task.priority;
    document.getElementById('taskStatus').value = task.status;
    
    updateCharCount('titleCharCount', task.title.length, 200);
    updateCharCount('descCharCount', task.description.length, 2000);
}

function populateAssignedUsersDropdown() {
    const dropdown = document.getElementById('taskAssignedTo');
    dropdown.innerHTML = '<option value="">Select user</option>';
    
    allUsers.forEach(user => {
        const option = document.createElement('option');
        option.value = user.id;
        option.textContent = user.name;
        dropdown.appendChild(option);
    });
}

function closeTaskModal() {
    document.getElementById('taskModal').style.display = 'none';
    document.getElementById('taskForm').reset();
    clearValidationErrors();
}

async function handleTaskSubmit(e) {
    e.preventDefault();
    
    const formData = {
        title: document.getElementById('taskTitle').value,
        description: document.getElementById('taskDescription').value,
        assignedTo: document.getElementById('taskAssignedTo').value,
        dueDate: document.getElementById('taskDueDate').value,
        priority: document.getElementById('taskPriority').value,
        status: document.getElementById('taskStatus').value,
        assignedBy: currentUser.id
    };
    
    // Validate form
    if (!validateTaskForm(formData)) {
        return;
    }
    
    showLoading('Saving task...', 'Please wait while we save your task');
    
    try {
        const response = await makeRequest('addTask', formData, currentToken);
        
        if (response.success) {
            hideLoading();
            showToast('success', 'Task created successfully!');
            closeTaskModal();
            loadTasksData();
        } else {
            hideLoading();
            showToast('error', response.message);
        }
    } catch (error) {
        hideLoading();
        showToast('error', 'Failed to create task');
        console.error('Task creation error:', error);
    }
}

function validateTaskForm(formData) {
    let isValid = true;
    
    // Clear previous errors
    clearValidationErrors();
    
    // Validate title
    if (!formData.title.trim()) {
        showValidationError('titleError', 'Task title is required');
        isValid = false;
    } else if (formData.title.length > 200) {
        showValidationError('titleError', 'Title must be less than 200 characters');
        isValid = false;
    }
    
    // Validate description
    if (!formData.description.trim()) {
        showValidationError('descError', 'Task description is required');
        isValid = false;
    } else if (formData.description.length > 2000) {
        showValidationError('descError', 'Description must be less than 2000 characters');
        isValid = false;
    }
    
    // Validate assigned user
    if (!formData.assignedTo) {
        showValidationError('assignError', 'Please select a user to assign this task to');
        isValid = false;
    }
    
    // Validate due date
    if (!formData.dueDate) {
        showValidationError('dueDateError', 'Due date is required');
        isValid = false;
    } else {
        const dueDate = new Date(formData.dueDate);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        if (dueDate < today) {
            showValidationError('dueDateError', 'Due date cannot be in the past');
            isValid = false;
        }
    }
    
    return isValid;
}

function clearValidationErrors() {
    const errorElements = ['titleError', 'descError', 'assignError', 'dueDateError'];
    errorElements.forEach(id => hideValidationError(id));
}

// Bulk Actions
function openBulkStatusModal() {
    const modal = document.getElementById('bulkStatusModal');
    const taskCount = document.getElementById('bulkTaskCount');
    
    taskCount.textContent = selectedTasks.size;
    modal.style.display = 'flex';
}

function closeBulkStatusModal() {
    document.getElementById('bulkStatusModal').style.display = 'none';
    document.getElementById('bulkStatus').value = '';
}

async function handleBulkStatusUpdate() {
    const newStatus = document.getElementById('bulkStatus').value;
    
    if (!newStatus) {
        showToast('error', 'Please select a status');
        return;
    }
    
    showLoading('Updating tasks...', `Updating ${selectedTasks.size} tasks`);
    
    try {
        const response = await makeRequest('bulkUpdateTasks', {
            taskIds: Array.from(selectedTasks),
            updates: { status: newStatus }
        }, currentToken);
        
        if (response.success) {
            hideLoading();
            showToast('success', response.message);
            closeBulkStatusModal();
            selectedTasks.clear();
            updateBulkActions();
            loadTasksData();
        } else {
            hideLoading();
            showToast('error', response.message);
        }
    } catch (error) {
        hideLoading();
        showToast('error', 'Failed to update tasks');
        console.error('Bulk update error:', error);
    }
}

async function handleBulkDelete() {
    if (!confirm(`Are you sure you want to delete ${selectedTasks.size} selected tasks? This action cannot be undone.`)) {
        return;
    }
    
    showLoading('Deleting tasks...', `Deleting ${selectedTasks.size} tasks`);
    
    try {
        const response = await makeRequest('bulkDeleteTasks', {
            taskIds: Array.from(selectedTasks)
        }, currentToken);
        
        if (response.success) {
            hideLoading();
            showToast('success', response.message);
            selectedTasks.clear();
            updateBulkActions();
            loadTasksData();
        } else {
            hideLoading();
            showToast('error', response.message);
        }
    } catch (error) {
        hideLoading();
        showToast('error', 'Failed to delete tasks');
        console.error('Bulk delete error:', error);
    }
}

// Filtering
function filterTasks() {
    const searchTerm = document.getElementById('searchTasks').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    const priorityFilter = document.getElementById('priorityFilter').value;
    
    let filteredTasks = allTasks;
    
    // Search filter
    if (searchTerm) {
        filteredTasks = filteredTasks.filter(task => 
            task.title.toLowerCase().includes(searchTerm) ||
            task.description.toLowerCase().includes(searchTerm)
        );
    }
    
    // Status filter
    if (statusFilter !== 'all') {
        filteredTasks = filteredTasks.filter(task => task.status === statusFilter);
    }
    
    // Priority filter
    if (priorityFilter !== 'all') {
        filteredTasks = filteredTasks.filter(task => task.priority === priorityFilter);
    }
    
    displayAllTasks(filteredTasks);
}

// Utility Functions
function updateTasksTabLabel(count) {
    const labels = document.querySelectorAll('#tasksTabLabel, #mobileTasksTabLabel');
    labels.forEach(label => {
        label.textContent = `Tasks (${count})`;
    });
}

function isTaskOverdue(task) {
    if (task.status === 'completed') return false;
    
    const dueDate = new Date(task.duedate);
    const today = new Date();
    today.setHours(23, 59, 59, 999);
    
    return !isNaN(dueDate.getTime()) && dueDate < today;
}

function formatDate(dateString) {
    if (!dateString) return 'No date';
    
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return 'Invalid date';
    
    return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Loading and Toast Functions
function showLoading(title, message) {
    const overlay = document.getElementById('loadingOverlay');
    const titleElement = document.getElementById('loadingTitle');
    const messageElement = document.getElementById('loadingMessage');
    
    if (titleElement) titleElement.textContent = title;
    if (messageElement) messageElement.textContent = message;
    if (overlay) overlay.style.display = 'flex';
}

function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.style.display = 'none';
}

function showToast(type, message) {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    const icon = type === 'success' ? 'fa-check-circle' : 
                 type === 'error' ? 'fa-exclamation-circle' : 
                 type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle';
    
    toast.innerHTML = `
        <i class="fas ${icon}"></i>
        <span>${escapeHtml(message)}</span>
    `;
    
    container.appendChild(toast);
    
    // Auto remove after 5 seconds
    setTimeout(() => {
        if (toast.parentNode) {
            toast.parentNode.removeChild(toast);
        }
    }, 5000);
}

// API Communication
async function makeRequest(action, data = {}, token = null) {
    const url = `${window.location.origin}${window.location.pathname}`;
    
    const requestData = {
        action: action,
        data: data
    };
    
    if (token) {
        requestData.token = token;
    }
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(requestData)
        });
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const result = await response.json();
        return result;
    } catch (error) {
        console.error('API request failed:', error);
        throw error;
    }
}
