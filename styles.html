<style>
/* Reset */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color: #1f2937; background: #0f172a; }

/* Layout */
.header { position: sticky; top: 0; z-index: 100; background: #111827; color: #e5e7eb; border-bottom: 1px solid #1f2937; }
.header .header-content { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
.header .header-left { display: flex; align-items: center; gap: 14px; }
.logo { display: inline-flex; align-items: center; gap: 10px; color: #60a5fa; }
.logo i { font-size: 20px; }
.logo h1 { font-size: 18px; margin: 0; font-weight: 600; color: #e5e7eb; }

/* Navigation */
.nav-tabs { display: flex; gap: 6px; }
.nav-tab { background: transparent; color: #cbd5e1; border: 1px solid transparent; padding: 8px 10px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
.nav-tab:hover { background: #0b1220; color: #e5e7eb; }
.nav-tab.active { background: #0b1220; border-color: #1f2a44; color: #e5e7eb; }

.mobile-menu-btn { display: none; background: transparent; color: #cbd5e1; border: none; font-size: 18px; }
.mobile-nav { display: none; border-top: 1px solid #1f2937; }
.mobile-nav.open { display: flex; }
.mobile-nav .mobile-nav-tab { flex: 1; background: transparent; color: #cbd5e1; padding: 12px; border: none; border-right: 1px solid #1f2937; cursor: pointer; }
.mobile-nav .mobile-nav-tab.active { background: #0b1220; color: #e5e7eb; }

/* Main */
.main-content { max-width: 1100px; margin: 20px auto; padding: 0 16px 32px; }
.page-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 12px; }

/* Cards */
.content-card, .stat-card { background: #0b1220; border: 1px solid #1f2a44; border-radius: 12px; padding: 14px; margin-bottom: 14px; color: #cbd5e1; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 14px 0; }
.stat-card .stat-content { display: flex; align-items: center; justify-content: space-between; }
.stat-info { display: flex; flex-direction: column; gap: 4px; }
.stat-label { font-size: 12px; color: #9ca3af; }
.stat-value { font-size: 22px; font-weight: 700; }
.stat-icon { color: #64748b; }
.stat-icon.total { color: #60a5fa; }
.stat-value.pending { color: #f59e0b; }
.stat-value.progress { color: #60a5fa; }
.stat-value.completed { color: #22c55e; }
.stat-value.overdue { color: #ef4444; }

/* Buttons */
.btn-primary, .btn-secondary, .btn-outline, .btn-danger, .btn-icon, .btn-logout, .mobile-nav-tab { transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.04s ease; }
.btn-primary { background: #2563eb; border: 1px solid #1d4ed8; color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #0b1220; color: #cbd5e1; border: 1px solid #1f2a44; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
.btn-outline { background: transparent; color: #cbd5e1; border: 1px dashed #334155; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
.btn-danger { background: #dc2626; border: 1px solid #b91c1c; color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
.btn-danger:hover { background: #b91c1c; }
.btn-logout { background: #0b1220; color: #fca5a5; border: 1px solid #7f1d1d; padding: 8px 10px; border-radius: 10px; cursor: pointer; }
.btn-logout:hover { background: #111; }
.btn-icon { background: transparent; border: 1px solid #1f2a44; color: #cbd5e1; padding: 6px; border-radius: 8px; cursor: pointer; }
.btn-icon:hover { background: #0f1a2e; }
.auto-refresh-btn.active { border-color: #1d4ed8; color: #93c5fd; }

/* Inputs */
.form-group { margin-bottom: 12px; }
label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
input[type="text"], input[type="email"], input[type="password"], input[type="date"], select, textarea { width: 100%; background: #0b1220; color: #e5e7eb; border: 1px solid #1f2a44; border-radius: 10px; padding: 10px 12px; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
.input-group { position: relative; display: flex; align-items: center; }
.input-group i { position: absolute; left: 12px; color: #64748b; }
.input-group input { padding-left: 36px; }
.toggle-password { position: absolute; right: 6px; background: transparent; color: #94a3b8; border: none; cursor: pointer; padding: 6px; }

/* Login */
.login-container { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
.login-card { width: 100%; max-width: 420px; background: #0b1220; border: 1px solid #1f2a44; border-radius: 14px; padding: 18px; }
.login-header { text-align: center; margin-bottom: 14px; color: #cbd5e1; }
.login-header .logo { justify-content: center; }
.error-message { background: rgba(239, 68, 68, .08); color: #fecaca; border: 1px solid #7f1d1d; padding: 8px 10px; border-radius: 8px; }
.validation-message { color: #fca5a5; font-size: 12px; margin-top: 6px; }
.password-strength { margin-top: 6px; }
.strength-bar { height: 6px; background: #111827; border: 1px solid #1f2a44; border-radius: 999px; overflow: hidden; }
.strength-fill { height: 100%; width: 0%; background: #ef4444; transition: width .2s ease, background .2s ease; }
.demo-accounts { margin-top: 12px; color: #94a3b8; }
.demo-grid { display: grid; gap: 6px; grid-template-columns: 1fr; }
.demo-account { background: #0f1a2e; border: 1px solid #1f2a44; padding: 8px 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 2px; }

/* Tabs */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Filters */
.filters-container { display: flex; flex-direction: column; gap: 12px; }
.filters-grid { display: grid; grid-template-columns: 1fr 200px 200px; gap: 10px; }
.date-range-filter, .date-range-filter-tasks { display: flex; align-items: end; gap: 10px; flex-wrap: wrap; }
.date-input-group { min-width: 200px; }

/* Tasks */
.tasks-container { margin-top: 12px; }
.tasks-header { background: #0b1220; border: 1px solid #1f2a44; border-radius: 10px; padding: 8px 12px; margin-bottom: 8px; color: #cbd5e1; display: flex; align-items: center; gap: 10px; }
.tasks-list { display: grid; gap: 10px; }
.task-item { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; background: #0b1220; border: 1px solid #1f2a44; border-radius: 12px; padding: 10px; color: #cbd5e1; }
.task-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.task-title-row h4 { margin: 0; font-size: 15px; color: #e5e7eb; }
.task-meta { display: flex; gap: 12px; color: #94a3b8; font-size: 12px; margin-top: 6px; }
.task-desc { color: #cbd5e1; font-size: 13px; margin-top: 6px; line-height: 1.4; }
.task-actions { display: flex; align-items: center; gap: 6px; }

/* Badges */
.status-badge, .priority-badge { display: inline-block; font-size: 11px; padding: 4px 8px; border-radius: 999px; border: 1px solid; }
.status-badge.pending { color: #f59e0b; border-color: rgba(245, 158, 11, .35); background: rgba(245, 158, 11, .12); }
.status-badge.in-progress { color: #60a5fa; border-color: rgba(96, 165, 250, .35); background: rgba(96, 165, 250, .12); }
.status-badge.completed { color: #22c55e; border-color: rgba(34, 197, 94, .35); background: rgba(34, 197, 94, .12); }
.priority-badge.low { color: #a3e635; border-color: rgba(163, 230, 53, .35); background: rgba(163, 230, 53, .12); }
.priority-badge.medium { color: #60a5fa; border-color: rgba(96, 165, 250, .35); background: rgba(96, 165, 250, .12); }
.priority-badge.high { color: #ef4444; border-color: rgba(239, 68, 68, .35); background: rgba(239, 68, 68, .12); }

/* Checkbox */
.checkbox-container { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.checkbox-container input { display: none; }
.checkmark { width: 18px; height: 18px; border-radius: 6px; background: #0b1220; border: 1px solid #1f2a44; position: relative; display: inline-block; }
.checkbox-container input:checked + .checkmark { background: #2563eb; border-color: #1d4ed8; }
.checkbox-container input:checked + .checkmark::after { content: '\2713'; position: absolute; color: white; font-size: 12px; left: 50%; top: 46%; transform: translate(-50%, -50%); }

/* Users */
.users-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.user-card { display: flex; gap: 10px; background: #0b1220; border: 1px solid #1f2a44; border-radius: 12px; padding: 10px; color: #cbd5e1; }
.user-card img { width: 42px; height: 42px; border-radius: 999px; object-fit: cover; border: 1px solid #1f2a44; }
.user-card .name { font-weight: 600; color: #e5e7eb; }
.user-card .email { font-size: 12px; color: #94a3b8; }
.user-card .role { margin-top: 6px; display: inline-block; font-size: 11px; padding: 4px 8px; border-radius: 999px; border: 1px solid #1f2a44; }
.user-card .role.admin { color: #f472b6; border-color: rgba(244, 114, 182, .35); background: rgba(244, 114, 182, .12); }
.user-card .role.user { color: #93c5fd; border-color: rgba(147, 197, 253, .35); background: rgba(147, 197, 253, .12); }

/* Modals */
.modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 500; background: rgba(2, 6, 23, .6); backdrop-filter: blur(2px); }
.modal-content { width: 95%; max-width: 620px; background: #0b1220; border: 1px solid #1f2a44; border-radius: 14px; padding: 12px; color: #cbd5e1; }
.modal-header { display: flex; align-items: center; justify-content: space-between; }
.modal-close { background: transparent; color: #cbd5e1; border: 1px solid #1f2a44; border-radius: 8px; padding: 6px; cursor: pointer; }
.modal-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.char-count { text-align: right; color: #94a3b8; font-size: 11px; margin-top: 6px; }

/* Loading overlay */
.loading-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 1000; background: rgba(2, 6, 23, .6); }
.loading-spinner { display: grid; place-items: center; gap: 10px; }
.spinner-ring { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.1); border-top-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text h3 { margin: 0; color: #e5e7eb; }
.loading-text p { margin: 0; color: #94a3b8; font-size: 12px; }

/* Toasts */
.toast-container { position: fixed; bottom: 12px; right: 12px; display: grid; gap: 8px; z-index: 1100; }
.toast { background: #0b1220; color: #e5e7eb; border: 1px solid #1f2a44; border-radius: 10px; padding: 10px 12px; transform: translateY(10px); opacity: 0; transition: transform .18s ease, opacity .18s ease; }
.toast.visible { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(34,197,94,.45); }
.toast.error { border-color: rgba(239,68,68,.45); }
.toast.info { border-color: rgba(96,165,250,.45); }

/* Session indicator */
.session-indicator { display: inline-flex; align-items: center; gap: 6px; color: #94a3b8; border: 1px solid #1f2a44; background: #0b1220; padding: 6px 10px; border-radius: 999px; }
.session-indicator i { font-size: 10px; }
.session-indicator i.online { color: #22c55e; }

/* Misc */
.header-right { display: flex; align-items: center; gap: 10px; }
.user-info { display: inline-flex; align-items: center; gap: 8px; }
.user-avatar { width: 28px; height: 28px; border-radius: 999px; object-fit: cover; border: 1px solid #1f2a44; }
.user-role { font-size: 12px; color: #94a3b8; }
.empty { padding: 14px; text-align: center; color: #94a3b8; border: 1px dashed #1f2a44; border-radius: 12px; background: rgba(15, 23, 42, .3); }
.header-actions { display: flex; align-items: center; gap: 8px; }
.bulk-actions { display: none; align-items: center; gap: 8px; }

/* Responsive */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
  .users-list { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 640px) {
  .desktop-nav { display: none; }
  .mobile-menu-btn { display: inline-flex; }
  .mobile-nav { display: none; }
  .page-header { flex-direction: column; align-items: flex-start; }
  .filters-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .users-list { grid-template-columns: 1fr; }
}
</style>
